<html>
    <head>
        <title>Typography</title>
        <style>
        body{
            background-color: cadetblue;
        }      
        p{
            font-family: 'Courier New', Courier, monospace;
        } 
        .text1{
            color:blueviolet;
            font-size:x-large;
        }
        .text2{
            color:yellowgreen;
            font-size:xx-large;
        }
        div{
            width:250px;
            height:100px;
            background-color: indianred;
            border:2px solid black
        }
        #test3{
            transform: rotateX(180deg);
        }
        </style>
    </head>
    <body>
        <p class="text1">Welcome to codingal</p>
        <p class="text2">Welcome to codingal</p>
        <h3>Ready to learn text-transform</h3>
        <div>Codingal</div>
        <div id="test3">Codingal</div>
</html>
