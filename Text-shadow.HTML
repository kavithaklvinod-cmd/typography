<html>
<head>
    <title>Text-shadow</title>
    <style>
        p{
            text-align: center;
            font-family: fantasy;
            font-size:30px;
        }
        #text{
            text-shadow: 2px 2px 2px red;
        }
        #box{
            box-shadow: 9px 9px 5px red;
        }
        #indent{
            text-indent: 20%;
        }
        </style>
</head>
<body>
    <p id="text">Codingal is a platform to learn coding</p>
    <p id="box">Codingal is a platform to learn coding</p>
    <p id="indent">Codingal is a platform to learn coding</p>
</body>
</html>
